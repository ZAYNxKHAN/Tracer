<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Zayn's Streak Tracker - A minimalist, cyber-glitch task tracker." />
  <title>Zayn’s Streak Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1 class="glitch-title">Zayn's Streak Tracker</h1>
    <div id="day-count" style="color: limegreen; font-weight: bold; font-size: 1.2em; margin-bottom: 8px;">
      Day 1 of 20
    </div>
    <div id="progress-container" style="width: 100%; background: #222; height: 20px; margin-bottom: 15px;">
      <div id="progress-bar" style="background: limegreen; height: 100%; width: 0%;"></div>
    </div>
  </header>

  <main>
    <section id="tasks-section">
      <ul id="tasks-list" style="list-style:none; padding-left:0;">
        <!-- Tasks will be dynamically injected here -->
      </ul>
    </section>

    <section class="actions" style="margin-top: 20px;">
      <button id="calculate-score-btn" style="margin-right:10px;">CALCULATE SCORE</button>
      <button id="next-day-btn" style="margin-right:10px;">NEXT DAY</button>
    </section>

    <section id="message-section" style="margin-top:20px;">
      <p id="today-score"></p>
      <p id="reward-message" class="hidden"></p>
    </section>
  </main>

  <footer style="margin-top: 40px; text-align:center; color: gray;">
    <p>Made in Karachi | Zayn’s Streak Tracker</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
